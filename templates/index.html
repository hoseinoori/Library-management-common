<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Advanced Library Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #0b0f19;
        color: #e2e8f0;
        font-family: "Segoe UI", sans-serif;
      }
      .navbar {
        background-color: #111827;
        border-bottom: 2px solid #06b6d4;
      }
      .navbar-brand,
      .nav-link {
        color: #06b6d4 !important;
        font-weight: bold;
      }
      .card {
        background: rgba(17, 24, 39, 0.8);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(6, 182, 212, 0.2);
        color: white;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      }
      .btn-turquoise {
        background-color: #06b6d4;
        color: #0b0f19;
        font-weight: bold;
        transition: all 0.3s;
      }
      .btn-turquoise:hover {
        background-color: #0891b2;
        color: white;
        box-shadow: 0 0 15px #06b6d4;
      }
      .text-turquoise {
        color: #06b6d4;
      }
      .form-control,
      .form-select {
        background-color: #1f2937;
        border: 1px solid #374151;
        color: white;
      }
      .form-control:focus,
      .form-select:focus {
        background-color: #1f2937;
        color: white;
        border-color: #06b6d4;
        box-shadow: 0 0 8px #06b6d4;
      }
      .panel-section {
        display: none;
      }
      .list-group-item {
        background-color: #111827;
        border-color: #374151;
        color: white;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container">
        <a class="navbar-brand" href="#">📚 TURQUOISE LIBRARY PRO</a>
        <div class="d-flex">
          <span id="user-display" class="text-white me-3 pt-2"></span>
          <button
            id="logout-btn"
            class="btn btn-outline-danger btn-sm d-none"
            onclick="logout()"
          >
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container mb-5">
      <div id="auth-section" class="row justify-content-center">
        <div class="col-md-5">
          <div class="card p-4">
            <h3 class="text-center text-turquoise mb-4" id="auth-title">
              Login
            </h3>
            <div class="mb-3">
              <label class="form-label">Username</label
              ><input type="text" id="username" class="form-control" />
            </div>
            <div class="mb-3 d-none" id="fullname-wrapper">
              <label class="form-label">Full Name</label
              ><input type="text" id="fullname" class="form-control" />
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label
              ><input type="password" id="password" class="form-control" />
            </div>
            <div class="mb-3 d-none" id="role-wrapper">
              <label class="form-label">Role</label>
              <select id="role" class="form-select">
                <option value="member">Member</option>
                <option value="librarian">Librarian</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <button
              class="btn btn-turquoise w-100 mb-3"
              id="auth-btn"
              onclick="handleAuth()"
            >
              Login
            </button>
            <p
              class="text-center text-muted small"
              style="cursor: pointer"
              onclick="toggleAuthMode()"
              id="toggle-text"
            >
              Don't have an account? Sign Up
            </p>
          </div>
        </div>
      </div>

      <div id="dashboard" class="panel-section">
        <h2 class="mb-4">
          Library Panel: <span class="text-turquoise" id="panel-role">...</span>
        </h2>

        <div class="card p-4 mb-4">
          <h4 class="text-turquoise">🔍 Search and Loan Books</h4>
          <div class="input-group mb-3">
            <input
              type="text"
              id="search-input"
              class="form-control"
              placeholder="Search by title or author..."
            />
            <button class="btn btn-turquoise" onclick="searchBooks()">
              Search
            </button>
          </div>
          <div id="books-results" class="row"></div>
        </div>

        <div id="member-panel" class="panel-section card p-4 mb-4">
          <h4 class="text-turquoise">
            📋 My Borrowed Books & Requests (show_my_books)
          </h4>
          <div id="my-loans-list"></div>
        </div>

        <div id="management-panel" class="panel-section card p-4">
          <h4 class="text-turquoise">🛠️ System Control Panel</h4>
          <div class="mb-3">
            <button
              class="btn btn-outline-info me-2 btn-sm mb-2"
              onclick="loadAllRequests()"
            >
              1. Manage Requests
            </button>
            <button
              class="btn btn-outline-info me-2 btn-sm mb-2"
              onclick="showAddBookForm()"
            >
              2. Add Book
            </button>
            <button
              class="btn btn-outline-info me-2 btn-sm mb-2"
              id="admin-users-btn"
              onclick="loadAllUsers()"
            >
              3. Manage Users
            </button>
          </div>
          <hr style="border-color: #374151" />
          <div id="management-content"></div>
        </div>
      </div>
    </div>

    <script>
      let isSignUp = false;
      let currentUserRole = "";

      function toggleAuthMode() {
        isSignUp = !isSignUp;
        document.getElementById("auth-title").innerText = isSignUp
          ? "Sign Up"
          : "Login";
        document.getElementById("auth-btn").innerText = isSignUp
          ? "Register"
          : "Login";
        document.getElementById("toggle-text").innerText = isSignUp
          ? "Already have an account? Login"
          : "Don't have an account? Sign Up";
        document
          .getElementById("fullname-wrapper")
          .classList.toggle("d-none", !isSignUp);
        document
          .getElementById("role-wrapper")
          .classList.toggle("d-none", !isSignUp);
      }

      async function handleAuth() {
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const fullname = document.getElementById("fullname").value;
        const role = document.getElementById("role").value;

        if (isSignUp) {
          const res = await fetch("/api/v1/auth/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username,
              password,
              full_name: fullname,
              role,
            }),
          });
          if (res.ok) {
            alert("Successfully registered! Now please login.");
            toggleAuthMode();
          } else {
            alert("Error signing up. Role might be invalid or user exists.");
          }
        } else {
          const res = await fetch("/api/v1/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (res.ok) {
            setupDashboard(data.username, data.role);
          } else {
            alert(data.detail || "Login failed");
          }
        }
      }

      function setupDashboard(username, role) {
        currentUserRole = role;
        document.getElementById("auth-section").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("logout-btn").classList.remove("d-none");
        document.getElementById("user-display").innerText =
          `Logged in as: ${username}`;
        document.getElementById("panel-role").innerText = role.toUpperCase();

        if (role === "member") {
          document.getElementById("member-panel").style.display = "block";
          document.getElementById("admin-users-btn").style.display = "none";
          loadMyLoans();
        } else {
          document.getElementById("management-panel").style.display = "block";
          if (role === "librarian") {
            document.getElementById("admin-users-btn").style.display = "none";
          }
          loadAllRequests();
        }
        searchBooks();
      }

      async function searchBooks() {
        const query = document.getElementById("search-input").value;
        const res = await fetch(`/api/v1/library/books?search=${query}`);
        const books = await res.json();
        let html = "";
        books.forEach((book) => {
          let actionButtons = `<button class="btn btn-sm btn-turquoise" onclick="requestLoan('${book.title}')">Loan Request</button>`;

          if (currentUserRole === "admin" || currentUserRole === "librarian") {
            actionButtons = `
                        <button class="btn btn-sm btn-warning me-1" onclick="showEditBookForm(${book.id}, '${book.title}', '${book.author}', '${book.category}', ${book.total_count})">Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteBook(${book.id})">Delete</button>
                    `;
          }

          html += `
                <div class="col-md-4 mb-3">
                    <div class="card p-3">
                        <h5>${book.title}</h5>
                        <p class="small text-muted mb-1">Author: ${book.author} | Category: ${book.category}</p>
                        <p class="small text-turquoise mb-2">Total: ${book.total_count} | Available: ${book.available_count}</p>
                        <div class="d-flex justify-content-between">${actionButtons}</div>
                    </div>
                </div>`;
        });
        document.getElementById("books-results").innerHTML =
          html || '<p class="text-muted">No books found.</p>';
      }

      async function requestLoan(title) {
        const res = await fetch(
          `/api/v1/library/loans/request?book_title=${encodeURIComponent(title)}`,
          { method: "POST" },
        );
        const data = await res.json();
        alert(data.detail || "Done");
        if (currentUserRole === "member") loadMyLoans();
        searchBooks();
      }

      async function loadMyLoans() {
        const res = await fetch("/api/v1/library/loans/my");
        const loans = await res.json();
        let html = '<ul class="list-group">';
        loans.forEach((loan) => {
          let actions = "";
          if (loan.status === "approved") {
            actions = `
                        <button class="btn btn-xs btn-outline-warning btn-sm me-1" onclick="loanAction(${loan.id}, 'extension')">Extend</button>
                        <button class="btn btn-xs btn-outline-danger btn-sm" onclick="loanAction(${loan.id}, 'return')">Return</button>
                    `;
          }
          html += `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div><b>${loan.book_title}</b> <span class="badge bg-secondary ms-2">${loan.status}</span> <br><small class="text-muted">${loan.date}</small></div>
                    <div>${actions}</div>
                </li>`;
        });
        document.getElementById("my-loans-list").innerHTML = html + "</ul>";
      }

      async function loanAction(id, action) {
        const res = await fetch(
          `/api/v1/library/loans/${id}/action?action=${action}`,
          { method: "POST" },
        );
        const data = await res.json();
        alert(data.detail);
        loadMyLoans();
      }

      async function loadAllRequests() {
        const res = await fetch("/api/v1/library/loans/all");
        const loans = await res.json();
        let html =
          '<h5>📥 Live Requests Management</h5><ul class="list-group">';
        let count = 0;
        loans.forEach((loan) => {
          if (loan.status.includes("pending")) {
            count++;
            html += `
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>User: <b>${loan.username}</b> | Book: <span class="text-turquoise">${loan.book_title}</span> | State: <span class="text-warning">${loan.status}</span></div>
                        <div>
                            <button class="btn btn-sm btn-success me-1" onclick="manageRequest(${loan.id}, 'approve')">Approve</button>
                            <button class="btn btn-sm btn-danger" onclick="manageRequest(${loan.id}, 'reject')">Reject</button>
                        </div>
                    </li>`;
          }
        });
        document.getElementById("management-content").innerHTML =
          count > 0
            ? html + "</ul>"
            : '<h5>📥 Live Requests Management</h5><p class="text-muted">There are no pending requests!</p>';
      }

      async function manageRequest(id, decision) {
        await fetch(`/api/v1/library/loans/${id}/manage?decision=${decision}`, {
          method: "POST",
        });
        loadAllRequests();
        searchBooks();
      }

      function showAddBookForm() {
        document.getElementById("management-content").innerHTML = `
                <h5>➕ Add Book</h5>
                <div class="row g-3" style="max-width: 400px">
                    <input type="text" id="new-title" placeholder="Title" class="form-control">
                    <input type="text" id="new-author" placeholder="Author" class="form-control">
                    <input type="text" id="new-cat" placeholder="Category" class="form-control">
                    <input type="number" id="new-count" placeholder="Total Count" class="form-control">
                    <button class="btn btn-turquoise" onclick="submitNewBook()">Save Book</button>
                </div>`;
      }

      async function submitNewBook() {
        const title = document.getElementById("new-title").value;
        const author = document.getElementById("new-author").value;
        const category = document.getElementById("new-cat").value;
        const total_count = parseInt(
          document.getElementById("new-count").value,
        );

        await fetch("/api/v1/library/books", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, author, category, total_count }),
        });
        alert("Book added successfully!");
        searchBooks();
        showAddBookForm();
      }

      function showEditBookForm(id, title, author, category, total) {
        document.getElementById("management-content").innerHTML = `
                <h5>✏️ Edit Book: ${title}</h5>
                <div class="row g-3" style="max-width: 400px">
                    <input type="text" id="edit-title" value="${title}" class="form-control">
                    <input type="text" id="edit-author" value="${author}" class="form-control">
                    <input type="text" id="edit-cat" value="${category}" class="form-control">
                    <input type="number" id="edit-count" value="${total}" class="form-control">
                    <button class="btn btn-warning text-dark fw-bold" onclick="submitEditBook(${id})">Update Book</button>
                </div>`;
      }

      async function submitEditBook(id) {
        const title = document.getElementById("edit-title").value;
        const author = document.getElementById("edit-author").value;
        const category = document.getElementById("edit-cat").value;
        const total_count = parseInt(
          document.getElementById("edit-count").value,
        );

        const res = await fetch(`/api/v1/library/books/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, author, category, total_count }),
        });
        if (res.ok) {
          alert("Book updated successfully!");
          searchBooks();
          loadAllRequests();
        } else {
          const d = await res.json();
          alert(d.detail || "Error");
        }
      }

      async function deleteBook(id) {
        if (confirm("Are you sure you want to delete this book?")) {
          await fetch(`/api/v1/library/books/${id}`, { method: "DELETE" });
          searchBooks();
        }
      }

      async function loadAllUsers() {
        const res = await fetch("/api/v1/users/");
        const users = await res.json();
        let html =
          '<h5>👥 Manage Users (edit_users / remove_user)</h5><ul class="list-group">';
        users.forEach((user) => {
          html += `
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>Username: <b>${user.username}</b> | Name: <b>${user.full_name}</b> | Role: <span class="text-turquoise">${user.role}</span></div>
                    <div>
                        <button class="btn btn-sm btn-outline-warning me-1" onclick="showEditUserForm('${user.username}', '${user.full_name}', '${user.role}')">Edit</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteUser('${user.username}')">Remove</button>
                    </div>
                </li>`;
        });
        document.getElementById("management-content").innerHTML =
          html + "</ul>";
      }

      function showEditUserForm(username, name, role) {
        document.getElementById("management-content").innerHTML = `
                <h5>✏️ Edit User: ${username}</h5>
                <div class="row g-3" style="max-width: 400px">
                    <input type="text" id="u-name" value="${name}" class="form-control" placeholder="Full Name">
                    <input type="password" id="u-pass" class="form-control" placeholder="New Password (Leave empty to skip)">
                    <select id="u-role" class="form-select">
                        <option value="member" ${role === "member" ? "selected" : ""}>Member</option>
                        <option value="librarian" ${role === "librarian" ? "selected" : ""}>Librarian</option>
                        <option value="admin" ${role === "admin" ? "selected" : ""}>Admin</option>
                    </select>
                    <button class="btn btn-warning text-dark fw-bold" onclick="submitEditUser('${username}')">Update User</button>
                </div>`;
      }

      async function submitEditUser(username) {
        const full_name = document.getElementById("u-name").value;
        const password = document.getElementById("u-pass").value;
        const role = document.getElementById("u-role").value;

        let bodyData = { full_name, role };
        if (password) bodyData.password = password;

        await fetch(`/api/v1/users/${username}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(bodyData),
        });
        alert("User updated!");
        loadAllUsers();
      }

      async function deleteUser(username) {
        if (confirm(`Delete user ${username}?`)) {
          const res = await fetch(`/api/v1/users/${username}`, {
            method: "DELETE",
          });
          const data = await res.json();
          if (res.ok) {
            alert(data.detail);
            loadAllUsers();
          } else {
            alert(data.detail);
          }
        }
      }

      async function logout() {
        await fetch("/api/v1/auth/logout", { method: "POST" });
        location.reload();
      }
    </script>
  </body>
</html>
